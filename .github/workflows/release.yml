name: Release

# Manually triggered from the GitHub UI (Actions → Release → Run workflow).
# Order of operations:
#   1. bump version locally
#   2. run tests
#   3. build & push Docker image (so a broken image never produces a git tag)
#   4. commit, tag, push
#   5. publish GitHub Release with auto-generated notes (.github/release.yml)
on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Semver bump'
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major
      prerelease:
        description: 'Mark the release as a pre-release'
        required: false
        type: boolean
        default: false
      dry-run:
        description: 'Dry run (no commit, tag, image push or release)'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Guard against running on a non-default branch
        if: github.ref != format('refs/heads/{0}', github.event.repository.default_branch)
        run: |
          echo "::error::Release must be run from the default branch (${{ github.event.repository.default_branch }}), got ${{ github.ref }}"
          exit 1

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Use Node.js 20.x
        uses: actions/setup-node@v6
        with:
          node-version: 20.x
          cache: 'npm'

      - run: npm ci

      - run: npm test

      - name: Bump version (working tree only)
        id: bump
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          npm version "${{ inputs.bump }}" --no-git-tag-version
          npm install --package-lock-only --ignore-scripts
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "current_version=${CURRENT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "new_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to DockerHub
        if: ${{ !inputs.dry-run }}
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ !inputs.dry-run }}
          tags: |
            bryntum/pdf-export-server:${{ steps.bump.outputs.new_version }}
            bryntum/pdf-export-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Configure git
        if: ${{ !inputs.dry-run }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Commit, tag and push
        if: ${{ !inputs.dry-run }}
        run: |
          git add package.json package-lock.json
          git commit -m "chore(release): ${{ steps.bump.outputs.tag }}"
          git tag -a "${{ steps.bump.outputs.tag }}" -m "${{ steps.bump.outputs.tag }}"
          git push origin HEAD
          git push origin "${{ steps.bump.outputs.tag }}"

      - name: Create GitHub Release
        if: ${{ !inputs.dry-run }}
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.bump.outputs.tag }}
          name: ${{ steps.bump.outputs.tag }}
          generate_release_notes: true
          prerelease: ${{ inputs.prerelease }}
          draft: false

      - name: Summary
        if: ${{ always() }}
        run: |
          {
            echo "## Release Summary"
            echo ""
            echo "- **Previous version:** ${{ steps.bump.outputs.current_version }}"
            echo "- **New version:** ${{ steps.bump.outputs.new_version }}"
            echo "- **Tag:** ${{ steps.bump.outputs.tag }}"
            echo "- **Pre-release:** ${{ inputs.prerelease }}"
            echo "- **Dry run:** ${{ inputs.dry-run }}"
            echo "- **Docker image:** bryntum/pdf-export-server:${{ steps.bump.outputs.new_version }}"
          } >> "$GITHUB_STEP_SUMMARY"
