name: Release

# Manually triggered from the GitHub UI (Actions → Release → Run workflow).
# Order of operations:
#   1. prepare:  run tests, bump version, commit to main (no tag yet)
#   2. build:    build & push multi-arch image from the bumped commit
#                (uses docker/github-builder — native amd64 + arm64 runners,
#                 in-Dockerfile tests run natively on each arch)
#   3. finalize: tag the bumped commit, push tag, publish GitHub Release
#
# If `build` fails, the bumped commit is on main but no tag/release/image
# exists. Recovery: revert the commit and retry, or fix and rerun.
on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Semver bump'
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major
      prerelease:
        description: 'Mark the release as a pre-release'
        required: false
        type: boolean
        default: false
      dry-run:
        description: 'Dry run (test + report what would happen; no commit, image push, tag, or release)'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  prepare:
    name: Test, bump and commit
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      current_version: ${{ steps.bump.outputs.current_version }}
      new_version: ${{ steps.bump.outputs.new_version }}
      tag: ${{ steps.bump.outputs.tag }}
      sha: ${{ steps.commit.outputs.sha }}
    steps:
      - name: Guard against running on a non-default branch
        if: github.ref != format('refs/heads/{0}', github.event.repository.default_branch)
        run: |
          echo "::error::Release must be run from the default branch (${{ github.event.repository.default_branch }}), got ${{ github.ref }}"
          exit 1

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Use Node.js 20.x
        uses: actions/setup-node@v6
        with:
          node-version: 20.x
          cache: 'npm'

      - run: npm ci

      - run: npm test

      - name: Bump version
        id: bump
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          npm version "${{ inputs.bump }}" --no-git-tag-version
          npm install --package-lock-only --ignore-scripts
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "current_version=${CURRENT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "new_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Configure git
        if: ${{ !inputs.dry-run }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Commit bump to main (no tag yet)
        id: commit
        if: ${{ !inputs.dry-run }}
        run: |
          git add package.json package-lock.json
          git commit -m "chore(release): ${{ steps.bump.outputs.tag }}"
          git push origin HEAD
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  build:
    name: Build & push multi-arch image
    needs: prepare
    if: ${{ !inputs.dry-run }}
    permissions:
      contents: read
      id-token: write
    uses: docker/github-builder/.github/workflows/build.yml@v1
    with:
      output: image
      push: true
      platforms: linux/amd64,linux/arm64
      cache: true
      meta-images: bryntum/pdf-export-server
      meta-tags: |
        type=raw,value=${{ needs.prepare.outputs.new_version }}
        type=raw,value=latest
    secrets:
      registry-auths: |
        - username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

  finalize:
    name: Tag and publish release
    needs: [prepare, build]
    if: ${{ !inputs.dry-run }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.sha }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Tag and push
        run: |
          git tag -a "${{ needs.prepare.outputs.tag }}" -m "${{ needs.prepare.outputs.tag }}"
          git push origin "${{ needs.prepare.outputs.tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.tag }}
          generate_release_notes: true
          prerelease: ${{ inputs.prerelease }}
          draft: false

  summary:
    name: Summary
    needs: [prepare, build, finalize]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: |
          {
            echo "## Release Summary"
            echo ""
            echo "- **Previous version:** ${{ needs.prepare.outputs.current_version }}"
            echo "- **New version:** ${{ needs.prepare.outputs.new_version }}"
            echo "- **Tag:** ${{ needs.prepare.outputs.tag }}"
            echo "- **Pre-release:** ${{ inputs.prerelease }}"
            echo "- **Dry run:** ${{ inputs.dry-run }}"
            echo "- **Docker image:** bryntum/pdf-export-server:${{ needs.prepare.outputs.new_version }} (linux/amd64, linux/arm64)"
          } >> "$GITHUB_STEP_SUMMARY"
