name: Docker Image

# Manually triggered from the GitHub UI (Actions → Docker Image → Run workflow).
# Rebuilds the Docker image from the current source and pushes it to DockerHub.
# No version bump, no git commit/tag, no GitHub Release — the image is tagged with
# the version already present in package.json (plus `latest`).
on:
  workflow_dispatch:
    inputs:
      latest:
        description: 'Also push the `latest` tag'
        required: false
        type: boolean
        default: true
      dry-run:
        description: 'Dry run (build only, no push)'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  docker:
    name: Build and push image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Read version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Compute image tags
        id: tags
        run: |
          {
            echo 'value<<EOF'
            echo "bryntum/pdf-export-server:${{ steps.version.outputs.version }}"
            if [ "${{ inputs.latest }}" = "true" ]; then
              echo "bryntum/pdf-export-server:latest"
            fi
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to DockerHub
        if: ${{ !inputs.dry-run }}
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ !inputs.dry-run }}
          tags: ${{ steps.tags.outputs.value }}

      - name: Summary
        if: ${{ always() }}
        run: |
          {
            echo "## Docker Image Summary"
            echo ""
            echo "- **Version:** ${{ steps.version.outputs.version }}"
            echo "- **Pushed \`latest\`:** ${{ inputs.latest }}"
            echo "- **Dry run:** ${{ inputs.dry-run }}"
            echo "- **Image:** bryntum/pdf-export-server:${{ steps.version.outputs.version }}"
          } >> "$GITHUB_STEP_SUMMARY"
